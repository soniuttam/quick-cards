<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f7f5">
  <meta name="description" content="Download Quick Cards, a minimal macOS menu bar notes app.">
  <meta property="og:title" content="Quick Cards">
  <meta property="og:description" content="A minimal macOS menu bar notes app for quick card-style notes.">
  <meta property="og:image" content="assets/quick-cards-icon.png">
  <title>Quick Cards</title>
  <link rel="icon" href="assets/quick-cards-icon.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #74736f;
      --line: color-mix(in srgb, currentColor 12%, transparent);
      --surface: color-mix(in srgb, canvas 72%, transparent);
      --button: #111111;
      --buttonText: #ffffff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e0f;
        --text: #f4f4f1;
        --muted: #aaa7a0;
        --button: #f4f4f1;
        --buttonText: #101011;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .shell {
      width: 100%;
      max-width: min(560px, calc(100vw - 64px));
      min-width: 0;
      display: grid;
      gap: 28px;
      justify-items: center;
      text-align: center;
    }

    .shell > * {
      max-width: 100%;
    }

    .icon {
      width: 112px;
      height: 112px;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 9vw, 88px);
      line-height: 0.92;
      letter-spacing: 0;
      font-weight: 760;
    }

    .copy {
      max-width: 420px;
      margin: -10px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 450;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }

    a {
      color: inherit;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--button);
      color: var(--buttonText);
      text-decoration: none;
      font-size: 15px;
      font-weight: 680;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.18);
    }

    .ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
    }

    .steps {
      width: min(100%, 420px);
      display: grid;
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--line);
      text-align: left;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(22px) saturate(1.3);
      -webkit-backdrop-filter: blur(22px) saturate(1.3);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .number {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
    }

    footer {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 520px) {
      main {
        padding: 24px;
      }

      .shell {
        gap: 24px;
        max-width: calc(100vw - 48px);
      }

      .icon {
        width: 92px;
        height: 92px;
        border-radius: 20px;
      }

      h1 {
        font-size: 40px;
      }

      .copy {
        width: 100%;
        font-size: 17px;
      }

      .button {
        width: 100%;
      }

      .actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-labelledby="title">
      <img class="icon" src="assets/quick-cards-icon.png" alt="Quick Cards app icon">
      <h1 id="title">Quick Cards</h1>
      <p class="copy">A tiny macOS menu bar app for quick notes, card lists, and done marks.</p>

      <div class="actions">
        <a class="button" href="https://github.com/soniuttam/quick-cards/releases/download/v1.0.2/Quick-Cards-macOS.dmg">
          Download for Mac
        </a>
        <a class="button ghost" href="https://github.com/soniuttam/quick-cards">
          View GitHub
        </a>
      </div>

      <div class="steps" aria-label="Install steps">
        <div class="step"><span class="number">1</span><span>Open the downloaded DMG.</span></div>
        <div class="step"><span class="number">2</span><span>Drag Quick Cards into Applications.</span></div>
        <div class="step"><span class="number">3</span><span>Open Quick Cards from Applications.</span></div>
      </div>

      <footer>macOS 26 or newer</footer>
    </section>
  </main>
</body>
</html>
